<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO PRINT - FULL AUTO</title>
    <style>
        :root { --neon: #39ff14; --dark: #050505; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--dark); color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        .header { margin-top: 20px; z-index: 10; }
        .brand-title { font-size: 32px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); letter-spacing: 5px; margin: 0; }
        .subtitle { color: white; font-size: 14px; letter-spacing: 2px; margin-top: 5px; opacity: 0.8; }
        
        .info-container { margin-top: 40px; }
        #nome-evento { font-size: 22px; font-weight: bold; color: var(--neon); text-transform: uppercase; margin: 5px 0; min-height: 25px; }
        #formato-view { font-size: 12px; color: var(--neon); border: 1px solid var(--neon); padding: 5px 15px; border-radius: 20px; display: inline-block; font-weight: bold; }

        /* Interface da Câmera */
        #cam-container { position: fixed; inset: 0; background: #000; display: none; z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 20px; pointer-events: none; }
        #counter { font-size: 150px; font-weight: 900; color: var(--neon); text-shadow: 0 0 40px #000; display: flex; align-items: center; justify-content: center; flex-grow: 1; }
        #indicator { font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 50px; border: 1px solid var(--neon); color: var(--neon); }

        /* 1. Botão Olho (Posicionado mais para baixo) */
        .main-ui { flex-grow: 1; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 80px; }
        .btn-eye { 
            width: 130px; height: 130px; border-radius: 50%; border: 4px solid #222; background: #000; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 0 rgba(57, 255, 20, 0.7); animation: pulse-border 2s infinite;
        }
        .iris { width: 40px; height: 40px; border-radius: 50%; border: 3px solid var(--neon); box-shadow: 0 0 15px var(--neon); }
        
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(57, 255, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
        }

        /* 2. Seta Voltar Diferente (Minimalista) */
        .back-circle {
            position: absolute; left: 30px; bottom: 45px;
            width: 50px; height: 50px; background: rgba(255,255,255,0.1);
            border: 1px solid white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: auto;
        }
        .back-circle svg { width: 24px; height: 24px; fill: white; }

        .shutter-btn {
            width: 80px; height: 80px; background: black; border-radius: 50%; 
            border: 4px solid var(--neon); cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 15px var(--neon); animation: pulse-border 1.5s infinite;
        }

        #flash { position: fixed; inset: 0; background: white; display: none; z-index: 2000; }
        #loader { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .spin { width: 50px; height: 50px; border: 5px solid #222; border-top-color: var(--neon); border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="loader">
        <div class="spin"></div>
        <p id="loader-text" style="color: var(--neon); margin-top: 20px; font-weight: 900;">PROCESSANDO...</p>
    </div>

    <div id="cam-container">
        <video id="v" autoplay playsinline muted></video>
        <div id="overlay">
            <div id="indicator">FOTO 1 / 1</div>
            <div id="counter"></div>
            <div id="cam-controls" style="display:flex; align-items:center; justify-content:center; width:100%; position:relative; min-height:100px;">
                <div class="back-circle" onclick="voltarHome()">
                    <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" /></svg>
                </div>
                <div id="shutter-placeholder"></div>
            </div>
        </div>
    </div>

    <div class="header">
        <h1 class="brand-title">PHOTO PRINT</h1>
        <div class="subtitle">colecionando momentos</div>
        <div class="info-container">
            <div id="nome-evento">Sincronizando...</div>
            <div id="formato-view">---</div>
        </div>
    </div>

    <div class="main-ui">
        <div class="btn-eye" onclick="ligar()">
            <div class="iris"></div>
        </div>
    </div>

    <canvas id="c-snap" style="display:none"></canvas>
    <canvas id="c-strip" style="display:none"></canvas>

    <script>
        const API = "https://photoprint-api.maxprimefotovideo.workers.dev";
        let ev = ""; let frame = ""; let pics = []; let total = 1; let stream = null;

        async function sync() {
            try {
                const r = await fetch(`${API}/status?t=${Date.now()}`);
                const d = await r.json();
                if (ev !== d.evento) {
                    ev = d.evento;
                    document.getElementById('nome-evento').innerText = ev;
                    total = ev.toUpperCase().includes("TIRINHA") ? 3 : 1;
                    document.getElementById('formato-view').innerText = `MODO: ${total > 1 ? 'TIRINHA' : '10X15'}`;
                    getFrame(ev);
                }
            } catch (e) {}
        }

        async function getFrame(e) {
            try {
                const r = await fetch(`${API}/list-photos?evento=${encodeURIComponent(e)}`);
                const f = await r.json();
                const p = f.find(x => x.key.toLowerCase().endsWith('.png'));
                if (p) frame = `${API}/photo/${encodeURIComponent(p.key)}`;
            } catch (e) {}
        }

        async function ligar() {
            try {
                pics = [];
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } } 
                });
                document.getElementById('v').srcObject = stream;
                document.getElementById('cam-container').style.display = "block";
                document.getElementById('shutter-placeholder').innerHTML = '<div onclick="iniciarSequencia()" class="shutter-btn"></div>';
                document.getElementById('counter').innerText = "";
            } catch (err) { alert("Permita o acesso à câmera."); }
        }

        function voltarHome() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('cam-container').style.display = "none";
        }

        async function iniciarSequencia() {
            document.getElementById('shutter-placeholder').innerHTML = ""; 
            go(1);
        }

        async function go(n) {
            const cDisplay = document.getElementById('counter');
            document.getElementById('indicator').innerText = `FOTO ${n} / ${total}`;
            let tempo = (total > 1 && n === 1) ? 7 : 5;

            for (let i = tempo; i > 0; i--) {
                cDisplay.innerText = i;
                await new Promise(r => setTimeout(r, 1000));
            }
            cDisplay.innerText = "";
            snap();
            if (n < total) { setTimeout(() => go(n + 1), 1500); } 
            else { setTimeout(processarMontagem, 1000); }
        }

        function snap() {
            const f = document.getElementById('flash');
            f.style.display = "block"; setTimeout(() => f.style.display = "none", 100);
            const v = document.getElementById('v');
            const cv = document.getElementById('c-snap');
            cv.width = v.videoWidth; cv.height = v.videoHeight;
            const ctx = cv.getContext('2d');
            ctx.drawImage(v, 0, 0);
            const img = new Image();
            img.src = cv.toDataURL('image/jpeg', 0.9);
            pics.push(img);
        }

        async function processarMontagem() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('cam-container').style.display = "none";
            document.getElementById('loader').style.display = "flex";

            const cv = document.getElementById('c-strip');
            const ctx = cv.getContext('2d');
            const m = new Image();
            m.crossOrigin = "anonymous";
            m.onload = () => {
                cv.width = m.width; cv.height = m.height;
                const hPart = cv.height / total;
                
                pics.forEach((img, i) => {
                    const s = Math.max(cv.width / img.width, hPart / img.height);
                    ctx.save();
                    ctx.beginPath(); ctx.rect(0, i * hPart, cv.width, hPart); ctx.clip();
                    ctx.drawImage(img, (cv.width - img.width * s) / 2, (i * hPart) + (hPart - img.height * s) / 2, img.width * s, img.height * s);
                    ctx.restore();

                    // 3. ADICIONA LINHA SEPARADORA (1mm aprox)
                    if (total > 1 && i < total - 1) {
                        ctx.fillStyle = "black"; // ou outra cor que combine com sua moldura
                        ctx.fillRect(0, (i + 1) * hPart - 2, cv.width, 4); // linha de 4px para garantir visibilidade
                    }
                });
                
                ctx.drawImage(m, 0, 0);
                const previewUrl = cv.toDataURL('image/jpeg', 0.8);
                document.getElementById('loader').innerHTML = `
                    <img src="${previewUrl}" style="height:60vh; border:3px solid white;">
                    <div style="display:flex; gap:15px; margin-top:15px;">
                        <button onclick="enviarBlob()" style="padding:15px 30px; background:var(--neon); border:none; font-weight:bold; border-radius:10px;">IMPRIMIR</button>
                        <button onclick="location.reload()" style="padding:15px 30px; background:#444; color:white; border:none; border-radius:10px;">REFAZER</button>
                    </div>
                `;
            };
            m.src = frame + "?t=" + Date.now();
        }

        function enviarBlob() {
            document.getElementById('loader').innerHTML = '<div class="spin"></div><p style="color:var(--neon); margin-top:20px;">ENVIANDO...</p>';
            const cv = document.getElementById('c-strip');
            cv.toBlob(async b => {
                const fd = new FormData();
                fd.append('file', b, 'f.jpg');
                fd.append('evento', ev);
                await fetch(`${API}/upload`, { method: 'POST', body: fd });
                location.reload();
            }, 'image/jpeg', 0.9);
        }

        setInterval(sync, 3000);
        sync();
    </script>
</body>
</html>
