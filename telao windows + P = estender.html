<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO PRINT | TV SLIDESHOW PRO</title>
    <style>
        :root { 
            --neon: #39ff14; 
            --bg: #000; 
            --border: rgba(57, 255, 20, 0.2);
        }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg); 
            background: radial-gradient(circle at 50% -20%, #1a3a12 0%, #000 80%);
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh;
        }
        
        header { 
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            border-left: 4px solid var(--neon);
            padding-left: 15px;
        }

        .brand-box h1 { 
            margin: 0; 
            font-size: 28px; 
            color: var(--neon); 
            font-weight: 900; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
            line-height: 1;
        }
        .brand-box p { 
            margin: 5px 0 0; 
            font-size: 10px; 
            color: #666; 
            letter-spacing: 3px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }

        #display {
            width: 100vw;
            height: calc(100vh - 140px); 
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide-container {
            position: absolute;
            inset: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .active { opacity: 1; }

        .slide-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(50px) brightness(0.4);
            transform: scale(1.1);
            z-index: 1;
        }

        .slide-main {
            position: relative;
            max-width: 92%;
            max-height: 92%;
            object-fit: contain;
            z-index: 2;
            box-shadow: 0 0 80px rgba(0,0,0,0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        #sponsor-bar {
            width: 100vw;
            height: 140px;
            background: rgba(0, 0, 0, 0.85);
            border-top: 1px solid var(--border);
            position: absolute;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: space-around; 
            padding: 10px 60px;
            box-sizing: border-box;
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .sponsor-logo {
            max-height: 90px;
            max-width: calc(100% / 5 - 30px); 
            object-fit: contain;
        }

        .sponsor-label {
            color: var(--neon);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: absolute;
            top: 12px;
            left: 30px;
            font-weight: bold;
            opacity: 0.5;
        }

        .config-trigger {
            position: absolute;
            top: 10px;
            right: 15px;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(57, 255, 20, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon);
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.4;
            transition: 0.3s;
        }

        #waiting-msg { 
            color: var(--neon); 
            font-size: 24px; 
            text-transform: uppercase; 
            letter-spacing: 10px; 
            position: absolute; 
            z-index: 10;
        }

        #logo-upload { display: none; }
    </style>
</head>
<body>

<input type="file" id="logo-upload" multiple accept="image/*">

<header>
    <div class="brand-box">
        <h1>Photo Print</h1>
        <p>colecionando momentos</p>
    </div>
</header>

<div id="display">
    <div id="waiting-msg">Aguardando Evento Ativo...</div>
</div>

<div id="sponsor-bar">
    <span class="sponsor-label">Parceiros Oficiais</span>
    <div class="config-trigger" onclick="document.getElementById('logo-upload').click()">L</div>
    <div id="logos-container" style="display:contents;"></div>
</div>

<script>
    const API_URL = "https://photoprint-api.maxprimefotovideo.workers.dev";
    
    let eventoAtivo = "";
    let fotos = [];
    let currentIndex = 0;
    let slideInterval = null;

    const fileInput = document.getElementById('logo-upload');
    const containerLogos = document.getElementById('logos-container');

    fileInput.addEventListener('change', function() {
        const files = Array.from(this.files).slice(0, 5); 
        const logosData = [];
        containerLogos.innerHTML = "";
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const imgBase64 = e.target.result;
                renderLogo(imgBase64);
                logosData.push(imgBase64);
                localStorage.setItem('pp_logos', JSON.stringify(logosData));
            };
            reader.readAsDataURL(file);
        });
    });

    function renderLogo(src) {
        const img = document.createElement('img');
        img.src = src;
        img.className = 'sponsor-logo';
        containerLogos.appendChild(img);
    }

    async function syncEvent() {
        try {
            const res = await fetch(`${API_URL}/status?t=${Date.now()}`);
            const data = await res.json();
            
            // Se o evento mudou ou foi ativado
            if (data.evento && data.evento !== eventoAtivo) {
                eventoAtivo = data.evento;
                document.getElementById('waiting-msg').style.display = 'none';
                fotos = [];
                currentIndex = 0;
                await updatePhotos(); // Espera a primeira busca
            } else if (!data.evento) {
                eventoAtivo = "";
                document.getElementById('waiting-msg').style.display = 'block';
                document.getElementById('waiting-msg').innerText = "Aguardando Evento Ativo...";
                // Limpa o slide atual se o evento for desativado
                const display = document.getElementById('display');
                const slides = display.querySelectorAll('.slide-container');
                slides.forEach(s => s.remove());
                clearInterval(slideInterval);
                slideInterval = null;
            }
        } catch (e) { console.error("Erro ao sincronizar status"); }
    }

    async function updatePhotos() {
        if (!eventoAtivo) return;
        try {
            // Adicionado timestamp para evitar cache do 404
            const res = await fetch(`${API_URL}/list-photos?evento=${encodeURIComponent(eventoAtivo)}&t=${Date.now()}`);
            const novasFotos = await res.json();
            
            if (Array.isArray(novasFotos) && novasFotos.length > 0) {
                if (JSON.stringify(novasFotos) !== JSON.stringify(fotos)) {
                    fotos = novasFotos.reverse();
                    if (!slideInterval) {
                        renderSlide();
                        slideInterval = setInterval(renderSlide, 8000); 
                    }
                }
            } else {
                document.getElementById('waiting-msg').style.display = 'block';
                document.getElementById('waiting-msg').innerText = "Nenhuma foto neste evento...";
            }
        } catch (e) { console.error("Erro ao carregar fotos"); }
    }

    function renderSlide() {
        if (fotos.length === 0) return;
        
        const display = document.getElementById('display');
        const fotoObjeto = fotos[currentIndex];
        
        // Montagem segura da URL
        const urlFinal = `${API_URL}/photo/${encodeURIComponent(fotoObjeto.key)}`;
        
        const slideContainer = document.createElement('div');
        slideContainer.className = 'slide-container';

        const imgBg = new Image();
        imgBg.crossOrigin = "anonymous";
        imgBg.src = urlFinal;
        imgBg.className = 'slide-bg';

        const imgMain = new Image();
        imgMain.crossOrigin = "anonymous";
        imgMain.src = urlFinal;
        imgMain.className = 'slide-main';

        // Só exibe o slide após a imagem principal carregar com sucesso
        imgMain.onload = () => {
            const oldSlides = display.querySelectorAll('.slide-container');
            slideContainer.appendChild(imgBg);
            slideContainer.appendChild(imgMain);
            display.appendChild(slideContainer);
            
            setTimeout(() => slideContainer.classList.add('active'), 100);
            
            if (oldSlides.length > 0) {
                setTimeout(() => { oldSlides.forEach(s => s.remove()); }, 1600);
            }
            currentIndex = (currentIndex + 1) % fotos.length;
        };

        imgMain.onerror = () => {
            console.error("Erro ao carregar imagem: " + urlFinal);
            currentIndex = (currentIndex + 1) % fotos.length;
            // Pula para a próxima se der erro
        };
    }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('pp_logos') || "[]");
        saved.forEach(src => renderLogo(src));
        syncEvent();
        setInterval(syncEvent, 5000);
        setInterval(updatePhotos, 15000); // Busca fotos novas a cada 15 seg
    };
</script>
</body>
</html>
